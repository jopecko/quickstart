name: release-branch

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Dry run
        type: boolean

permissions:
  id-token: write

jobs:
  create-release-branch:
    runs-on: crunchbase-v2
    if: ${{ !inputs.dry-run }}
    outputs:
      created: ${{ steps.create.outputs.created }}
    steps:
      - uses: peterjgrainger/action-create-branch@c2.2.0
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branch: 'release-candidate'
          sha: '${{ github.sha }}'

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new_release_published }}
      new-release-version: ${{ steps.semantic.outputs.new_release_version }}
    needs:
      - create-release-branch
    steps:
      - run: sleep 30s
      - uses: actions/checkout@v4
        with:
          ref: 'release-candidate'
      - uses: cycjimmy/semantic-release-action@v4
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          semantic_version: 24
          dry_run: ${{ inputs.dry-run }}
          extra_plugins: |
            conventional-changelog-conventionalcommits

      - name: Do something when a new release published
        #if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "${{ steps.semantic.outputs.new_release_published }}"
          echo "${{ steps.semantic.outputs.new_release_version }}"

  delete-release-branch:
    if: ${{ always() && needs.create-release-branch.outputs.created == 'true' }}
    runs-on: crunchbase-v2
    needs:
      - create-release-branch
      - release
    steps:
      - run: git push origin :${{ env.RELEASE_BRANCH }}
